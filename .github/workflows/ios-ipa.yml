name: Build iOS IPA (unsigned, for sideloading)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write .env
        run: |
          echo "EXPO_PUBLIC_API_URL=${EXPO_PUBLIC_API_URL:-https://api.equaly.dev}" > .env
          cat .env
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}

      - name: Prebuild native iOS project
        run: bunx expo prebuild -p ios --clean

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build archive (signing disabled)
        run: |
          cd ios
          set -o pipefail
          xcodebuild \
            -workspace Equaly.xcworkspace \
            -scheme Equaly \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/Equaly.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            | tee /tmp/xcodebuild.log \
            | grep -E 'error:|warning: .*sign|Signing|FAILED|Compiling' || true
          test -d "$PWD/build/Equaly.xcarchive"

      - name: Repackage as unsigned .ipa
        run: |
          cd ios/build
          mkdir -p Payload
          cp -r Equaly.xcarchive/Products/Applications/*.app Payload/
          zip -qr Equaly-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: Equaly-unsigned-ipa
          path: ios/build/Equaly-unsigned.ipa
          retention-days: 7
